<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password Flow Tester</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        h1 {
            color: #84FE0C;
            border-bottom: 2px solid #84FE0C;
            padding-bottom: 10px;
        }
        .test-section {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #3a3a3a;
        }
        .test-section h2 {
            color: #84FE0C;
            margin-top: 0;
        }
        button {
            background: #84FE0C;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #7AE60B;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-family: monospace;
        }
        .success {
            background: #2a4a2a;
            color: #84FE0C;
            border: 1px solid #84FE0C;
        }
        .error {
            background: #4a2a2a;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }
        .info {
            background: #2a3a4a;
            color: #6bb6ff;
            border: 1px solid #6bb6ff;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
        }
        .test-list {
            list-style: none;
            padding: 0;
        }
        .test-list li {
            padding: 8px;
            margin: 5px 0;
            background: #1a1a1a;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .test-list li::before {
            margin-right: 10px;
            font-size: 20px;
        }
        .test-list li.pass::before {
            content: "✅";
        }
        .test-list li.fail::before {
            content: "❌";
        }
        .test-list li.pending::before {
            content: "⏳";
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 2px solid #84FE0C;
            border-radius: 8px;
            background: white;
        }
    </style>
</head>
<body>
    <h1>🧪 Reset Password Flow Tester</h1>
    
    <div class="test-section">
        <h2>1️⃣ Page Accessibility Test</h2>
        <button onclick="testPageAccess()">Test Page Access</button>
        <div id="page-test-result"></div>
    </div>

    <div class="test-section">
        <h2>2️⃣ Password Strength Validator</h2>
        <input type="password" id="test-password" placeholder="Enter a test password" oninput="testPasswordStrength()">
        <div id="password-strength-result"></div>
        <ul class="test-list" id="password-requirements">
            <li class="pending">At least 8 characters</li>
            <li class="pending">One uppercase letter</li>
            <li class="pending">One lowercase letter</li>
            <li class="pending">One number</li>
            <li class="pending">One special character</li>
        </ul>
    </div>

    <div class="test-section">
        <h2>3️⃣ Visual Test - Preview Page</h2>
        <button onclick="loadPreview()">Load Reset Password Page</button>
        <button onclick="simulateTokenFlow()">Simulate Token Flow</button>
        <div id="preview-status"></div>
        <iframe id="preview-frame" style="display:none;"></iframe>
    </div>

    <div class="test-section">
        <h2>4️⃣ Test Results Summary</h2>
        <div id="test-summary"></div>
    </div>

    <script>
        async function testPageAccess() {
            const resultDiv = document.getElementById('page-test-result');
            resultDiv.innerHTML = '<div class="status info">Testing page accessibility...</div>';
            
            try {
                const response = await fetch('http://localhost:3000/reset-password');
                if (response.ok) {
                    const text = await response.text();
                    const hasValidContent = text.includes('Validating Reset Link');
                    
                    if (hasValidContent) {
                        resultDiv.innerHTML = '<div class="status success">✅ Page is accessible and contains expected content</div>';
                    } else {
                        resultDiv.innerHTML = '<div class="status error">⚠️ Page is accessible but content might be incorrect</div>';
                    }
                } else {
                    resultDiv.innerHTML = `<div class="status error">❌ Page returned status: ${response.status}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="status error">❌ Cannot reach page. Is dev server running? Error: ${error.message}</div>`;
            }
            
            updateSummary();
        }

        function testPasswordStrength() {
            const password = document.getElementById('test-password').value;
            const resultDiv = document.getElementById('password-strength-result');
            const reqList = document.getElementById('password-requirements');
            const items = reqList.getElementsByTagName('li');
            
            let score = 0;
            let feedback = [];
            
            // Test length
            if (password.length >= 8) {
                items[0].className = 'pass';
                score++;
            } else {
                items[0].className = 'fail';
                feedback.push('Need at least 8 characters');
            }
            
            // Test uppercase
            if (/[A-Z]/.test(password)) {
                items[1].className = 'pass';
                score++;
            } else {
                items[1].className = 'fail';
                feedback.push('Need uppercase letter');
            }
            
            // Test lowercase
            if (/[a-z]/.test(password)) {
                items[2].className = 'pass';
                score++;
            } else {
                items[2].className = 'fail';
                feedback.push('Need lowercase letter');
            }
            
            // Test number
            if (/[0-9]/.test(password)) {
                items[3].className = 'pass';
                score++;
            } else {
                items[3].className = 'fail';
                feedback.push('Need number');
            }
            
            // Test special char
            if (/[^A-Za-z0-9]/.test(password)) {
                items[4].className = 'pass';
                score++;
            } else {
                items[4].className = 'fail';
                feedback.push('Need special character');
            }
            
            let strength = 'Weak';
            let statusClass = 'error';
            if (score === 5) {
                strength = 'Strong';
                statusClass = 'success';
            } else if (score >= 3) {
                strength = 'Medium';
                statusClass = 'info';
            }
            
            if (password) {
                resultDiv.innerHTML = `<div class="status ${statusClass}">Password Strength: ${strength} (${score}/5)</div>`;
            } else {
                resultDiv.innerHTML = '';
                // Reset all items to pending
                for (let item of items) {
                    item.className = 'pending';
                }
            }
            
            updateSummary();
        }

        function loadPreview() {
            const frame = document.getElementById('preview-frame');
            const status = document.getElementById('preview-status');
            
            frame.style.display = 'block';
            frame.src = 'http://localhost:3000/reset-password';
            status.innerHTML = '<div class="status info">Loading reset password page... Without a valid token, you\'ll see "Reset Link Invalid" after 5 seconds.</div>';
            
            updateSummary();
        }

        function simulateTokenFlow() {
            const status = document.getElementById('preview-status');
            status.innerHTML = `
                <div class="status info">
                    <strong>Simulated Token Flow:</strong><br>
                    1. User receives email with magic link<br>
                    2. Link contains recovery token: /reset-password#access_token=xxx&type=recovery<br>
                    3. Supabase auth detects PASSWORD_RECOVERY event<br>
                    4. Form becomes active for password reset<br>
                    5. After successful reset, user is logged out<br><br>
                    <strong>Note:</strong> Real flow requires valid email token from Supabase
                </div>
            `;
        }

        function updateSummary() {
            const summary = document.getElementById('test-summary');
            const tests = [
                { name: 'Page Accessibility', element: 'page-test-result' },
                { name: 'Password Validator', element: 'password-strength-result' }
            ];
            
            let passCount = 0;
            let totalCount = 0;
            
            tests.forEach(test => {
                const el = document.getElementById(test.element);
                if (el && el.innerHTML) {
                    totalCount++;
                    if (el.innerHTML.includes('✅') || el.innerHTML.includes('success')) {
                        passCount++;
                    }
                }
            });
            
            if (totalCount > 0) {
                const passRate = Math.round((passCount / totalCount) * 100);
                summary.innerHTML = `
                    <div class="status ${passRate === 100 ? 'success' : passRate >= 50 ? 'info' : 'error'}">
                        Test Summary: ${passCount}/${totalCount} tests passed (${passRate}%)
                    </div>
                `;
            }
        }

        // Test example passwords
        const examplePasswords = [
            { password: 'Test123!@#', expected: 'Strong' },
            { password: 'password', expected: 'Weak' },
            { password: 'Password1', expected: 'Medium' }
        ];

        console.log('Example passwords to test:');
        examplePasswords.forEach(({ password, expected }) => {
            console.log(`  "${password}" - Expected: ${expected}`);
        });
    </script>
</body>
</html>
